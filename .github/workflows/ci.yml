name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          pwd
          ls -la
          find . -maxdepth 2

      - name: Check required files
        run: |
          test -f Dockerfile
          test -f docker-compose.yml
          test -f app/main.py
          test -f scripts/run.sh
          test -f .env.example

      - name: Build Docker image
        run: |
          docker build -t final-service:ci .
